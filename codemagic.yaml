# Codemagic CI/CD Configuration for Second Brain TWS Assistant (Root Layout)
workflows:
  android-apk-build:
    name: Android APK Release Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Fetch dependencies
        script: |
          flutter pub get
      - name: Flutter static analysis
        script: |
          flutter analyze
      - name: Build Release APK
        script: |
          flutter build apk --release --no-codesign
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - niraj417@users.noreply.github.com
        notify:
          success: true
          failure: true
